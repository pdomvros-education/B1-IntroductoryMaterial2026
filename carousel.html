<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Visuals Carousel | Υλικό Αναφοράς</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,600;0,800;1,600&display=swap" rel="stylesheet">
    <style>
        :root {
            --yellow: #ffd600;
            --ink: #111;
            --white: #fff;
            --cyan: #00f0ff;
            --magenta: #ff007f;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f4f4f4;
            background-image: radial-gradient(var(--ink) 2px, transparent 2px);
            background-size: 25px 25px;
            color: var(--ink);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Κεντρικό Container για απόλυτη ευθυγράμμιση */
        .container {
            max-width: 1000px; /* Κρατάει το header και το carousel στο ίδιο πλάτος */
            width: 100%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 0 15px; /* Αποστάσεις από τα πλαϊνά στα κινητά */
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0; /* Μηδενικό padding αριστερά/δεξιά για να στοιχίζεται με τις διαφάνειες */
            width: 100%;
            flex-shrink: 0;
        }

        .btn-home {
            text-decoration: none;
            color: white;
            background: var(--magenta);
            padding: 8px 14px;
            font-weight: 800;
            font-size: 0.85rem;
            text-transform: uppercase;
            border: 3px solid var(--ink);
            box-shadow: 4px 4px 0px var(--ink);
            transition: all 0.2s;
        }

        .btn-home:hover { 
            background: var(--cyan); 
            color: var(--ink); 
            transform: translate(-2px, -2px); 
            box-shadow: 6px 6px 0px var(--ink); 
        }

        /* Λογότυπο μειωμένο στο 50% */
        .logo { 
            max-width: 45px; 
            height: auto; 
            border: 3px solid var(--ink); 
            background: var(--white); 
        }

        /* Carousel Περιοχή */
        .carousel-box { 
            position: relative; 
            flex-grow: 1; 
            width: 100%; 
            overflow: hidden; 
            display: flex; 
            align-items: center; 
            padding: 0; 
            margin-bottom: 15px;
        }

        .carousel-track { 
            display: flex; 
            height: 100%; 
            transition: transform 0.4s ease-out; 
            width: 100%; 
        }

        .slide { 
            min-width: 100%; 
            height: 100%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 0; 
        }

        .slide img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border: 3px solid var(--ink);
            box-shadow: 6px 6px 0px var(--ink);
            background: var(--white);
        }

        /* Βελάκια */
        .carousel-button {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background-color: rgba(0,0,0,0.6);
            color: white;
            border: 2px solid var(--white);
            width: 44px;
            height: 44px;
            cursor: pointer;
            font-size: 1.2rem;
            border-radius: 50%;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.3s;
        }

        .carousel-button:hover { background-color: rgba(0,0,0,0.9); }
        .prev { left: 10px; }
        .next { right: 10px; }

        /* Footer */
        footer { 
            text-align: center; 
            font-weight: 600; 
            font-size: 0.75rem; 
            border-top: 3px solid var(--ink); 
            padding: 10px 0; 
            background: transparent; 
            flex-shrink: 0; 
            width: 100%; 
        }

        /* Desktop Adjustments */
        @media (min-width: 768px) {
            .container { padding: 0 30px; }
            header { padding: 20px 0; }
            .btn-home { font-size: 1rem; padding: 10px 20px; }
            .logo { max-width: 60px; } /* 50% του αρχικού 120px */
            .carousel-button { width: 54px; height: 54px; font-size: 1.5rem; }
            .prev { left: 20px; }
            .next { right: 20px; }
            footer { font-size: 0.9rem; padding: 15px 0; }
            .carousel-box { margin-bottom: 20px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <a href="index.html" class="btn-home">Αρχικη Σελιδα</a>
            <img src="logo_GR.png" alt="Λογότυπο" class="logo">
        </header>

        <div class="carousel-box" id="carouselBox">
            <button class="carousel-button prev" onclick="moveSlide(-1)">&#10094;</button>
            <button class="carousel-button next" onclick="moveSlide(1)">&#10095;</button>
            <div class="carousel-track" id="track">
                <div class="slide"><img src="1.png" alt="Σελίδα 1"></div>
                <div class="slide"><img src="2.png" alt="Σελίδα 2"></div>
                <div class="slide"><img src="3.png" alt="Σελίδα 3"></div>
                <div class="slide"><img src="4.png" alt="Σελίδα 4"></div>
                <div class="slide"><img src="5.png" alt="Σελίδα 5"></div>
                <div class="slide"><img src="6.png" alt="Σελίδα 6"></div>
                <div class="slide"><img src="7.png" alt="Σελίδα 7"></div>
                <div class="slide"><img src="8.png" alt="Σελίδα 8"></div>
                <div class="slide"><img src="9.png" alt="Σελίδα 9"></div>
                <div class="slide"><img src="10.png" alt="Σελίδα 10"></div>
                <div class="slide"><img src="11.png" alt="Σελίδα 11"></div>
                <div class="slide"><img src="12.png" alt="Σελίδα 12"></div>
                <div class="slide"><img src="13.png" alt="Σελίδα 13"></div>
                <div class="slide"><img src="14.png" alt="Σελίδα 14"></div>
            </div>
        </div>

        <footer>Δημιουργία: Παναγιώτης Δόμβρος, Εκπαιδευτικός Αγγλικής Γλώσσας & Θεατρολόγος | Διευθυντής 1ου Γυμνασίου Πυλαίας.</footer>
    </div>

    <script>
        let currentIndex = 0;
        const track = document.getElementById('track');
        const carouselBox = document.getElementById('carouselBox');
        const totalSlides = 14;

        function moveSlide(direction) {
            currentIndex = (currentIndex + direction + totalSlides) % totalSlides;
            track.style.transform = `translateX(${-currentIndex * 100}%)`;
        }

        // Swipe Support για οθόνες αφής
        let touchStartX = 0;
        carouselBox.addEventListener('touchstart', e => { 
            touchStartX = e.changedTouches[0].screenX; 
        }, {passive: true});
        
        carouselBox.addEventListener('touchend', e => {
            const touchEndX = e.changedTouches[0].screenX;
            if (touchEndX < touchStartX - 50) moveSlide(1);
            if (touchEndX > touchStartX + 50) moveSlide(-1);
        }, {passive: true});

        // Πλοήγηση με τα βελάκια του πληκτρολογίου
        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowLeft') moveSlide(-1);
            if (e.key === 'ArrowRight') moveSlide(1);
        });
    </script>
</body>
</html>
